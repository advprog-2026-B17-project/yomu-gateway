server:
  port: ${PORT:10000}

spring:
  application:
    name: yomu-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  cors:
    allowed-origins: ${YOMU_WEB_URL:http://localhost:3000,https://yomu-*.vercel.app,https://*.vercel.app}
  jwt:
    secret: ${JWT_SECRET}
